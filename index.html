<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Completo IRPF 2026</title>
    <link rel="stylesheet" href="styles.css"> <!-- External CSS link -->
    <script src="script.js" defer></script> <!-- External JS for interactivity -->
</head>
<body>
    <header>
        <h1>Guia Completo IRPF 2026</h1>
    </header>
    <main>
        <section id="intro">
            <h2>Introdução</h2>
            <p>Informações gerais sobre o IRPF 2026.</p>
        </section>
        <section id="checklist">
            <h2>Checklist de Documentos</h2>
            <ul>
                <li>Documentos necessários</li>
                <li>Prazo para entrega</li>
                <!-- Add more items -->
            </ul>
        </section>
        <section id="form-section">
            <h2>Formulário Interativo</h2>
            <form id="irpfForm">
                <label for="name">Nome:</label>
                <input type="text" id="name" name="name" required>
                <label for="income">Renda Anual:</label>
                <input type="number" id="income" name="income" required>
                <button type="submit">Enviar</button>
            </form>
        </section>
        <!-- More sections as needed -->
    </main>
    <footer>
        <h3>Contato</h3>
        <p>Email: contato@example.com</p>
    </footer>
</body>
</html>
